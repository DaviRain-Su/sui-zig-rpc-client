name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  ZIG_VERSION: 0.15.2

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: mlugg/setup-zig@v1
      with:
        version: ${{ env.ZIG_VERSION }}

    - name: Cache Zig dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/zig
          .zig-cache
        key: ${{ runner.os }}-zig-${{ hashFiles('build.zig') }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-zig-${{ hashFiles('build.zig') }}-
          ${{ runner.os }}-zig-

    - name: Check formatting
      run: zig fmt --check src/

    - name: Build debug
      run: zig build

    - name: Run tests
      timeout-minutes: 10
      run: zig build test --summary all

    - name: Build release
      run: zig build -Doptimize=ReleaseFast

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: sui-zig-${{ matrix.os }}
        path: zig-out/bin/sui-zig-rpc-client
        retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: mlugg/setup-zig@v1
      with:
        version: ${{ env.ZIG_VERSION }}

    - name: Check formatting
      run: zig fmt --check src/

    - name: Build debug
      run: zig build

  build-macos-webauthn:
    name: Build (macOS + WebAuthn)
    runs-on: macos-latest
    if: contains(github.event.head_commit.message, '[webauthn]') || github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: mlugg/setup-zig@v1
      with:
        version: ${{ env.ZIG_VERSION }}

    - name: Build with WebAuthn
      run: zig build -Dwebauthn

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: sui-zig-macos-webauthn
        path: zig-out/bin/sui-zig-rpc-client
        retention-days: 7
