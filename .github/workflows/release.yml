name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  ZIG_VERSION: 0.15.2

jobs:
  build:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            name: linux-amd64
          - os: macos-latest
            target: x86_64-macos
            name: macos-amd64
          - os: macos-latest
            target: aarch64-macos
            name: macos-arm64

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Zig
      uses: mlugg/setup-zig@v1
      with:
        version: ${{ env.ZIG_VERSION }}

    - name: Build
      run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

    - name: Package
      run: |
        cd zig-out/bin
        tar czf sui-zig-${{ matrix.name }}.tar.gz sui-zig-rpc-client

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: sui-zig-${{ matrix.name }}
        path: zig-out/bin/sui-zig-${{ matrix.name }}.tar.gz
        retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          sui-zig-linux-amd64/*.tar.gz
          sui-zig-macos-amd64/*.tar.gz
          sui-zig-macos-arm64/*.tar.gz
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
